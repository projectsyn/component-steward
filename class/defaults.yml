parameters:
  steward:
    =_metadata:
      multi_tenant: true
    namespace: syn
    api_url: 'https://api.syn.vshn.net/'
    token: '?{vaultkv:${cluster:tenant}/${cluster:name}/steward/token}'
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    images:
      steward:
        image: docker.io/projectsyn/steward
        tag: 'v0.13.0@sha256:0edd65c31dc4e5eee18d0ce5723cc6c057ba49925593fe047bdaba05bf2a220e'
      argocd:
        image: quay.io/argoproj/argocd
        tag: 'v3.1.16@sha256:6904027de677799c961179cf3a199ea99176683b3d988f068c8fa6720ef74805'

    priority_class: system-cluster-critical
    additional_facts: {}
