      argocd:
        image: quay.io/argoproj/argocd
        tag: 'v2.14.13@sha256:9d5675575a1a7f0f88e21a31fe336187de4c91b64c6f01d37ebec8cb18a71380'

    priority_class: system-cluster-critical
    additional_facts: {}
