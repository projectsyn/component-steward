parameters:
  steward:
    =_metadata:
      multi_tenant: true
    namespace: syn
    api_url: 'https://api.syn.vshn.net/'
    token: '?{vaultkv:${cluster:tenant}/${cluster:name}/steward/token}'
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    images:
      steward:
        image: docker.io/projectsyn/steward
        tag: 'v0.14.0@sha256:16b7987ac4cd443cb8f77a562764fc98c1580f9ea8abd44683828d2adbc67596'
      argocd:
        image: quay.io/argoproj/argocd
        tag: 'v3.1.16@sha256:6904027de677799c961179cf3a199ea99176683b3d988f068c8fa6720ef74805'

    priority_class: system-cluster-critical
    additional_facts: {}
    additional_facts_config_label: 'steward.syn.tools/include-facts'
