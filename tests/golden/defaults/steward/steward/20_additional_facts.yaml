apiVersion: v1
kind: ServiceAccount
metadata:
  annotations: {}
  labels:
    name: steward-additional-facts-manager
  name: steward-additional-facts-manager
  namespace: syn
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations: {}
  labels:
    name: steward-additional-facts-manager
  name: steward:additional-facts-manager
  namespace: syn
rules:
  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ''
    resourceNames:
      - additional-facts
    resources:
      - configmaps
    verbs:
      - '*'
  - apiGroups:
      - espejote.io
    resourceNames:
      - steward-additional-facts
    resources:
      - jsonnetlibraries
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations: {}
  labels:
    name: steward-additional-facts-manager
  name: steward:additional-facts-manager
  namespace: syn
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: steward:additional-facts-manager
subjects:
  - kind: ServiceAccount
    name: steward-additional-facts-manager
    namespace: syn
---
apiVersion: espejote.io/v1alpha1
kind: JsonnetLibrary
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/name: steward-additional-facts
  name: steward-additional-facts
  namespace: syn
spec:
  data:
    facts.json: |-
      {
          "blub": "blub",
          "blubobj": {
              "blub": "blub"
          },
          "deleted_blub": null
      }
    namespace.json: |-
      {
          "name": "syn"
      }
---
apiVersion: espejote.io/v1alpha1
kind: ManagedResource
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/name: steward-additional-facts
  name: steward-additional-facts
  namespace: syn
spec:
  applyOptions:
    force: true
  context:
    - name: configmap_facts
      resource:
        apiVersion: v1
        kind: ConfigMap
        labelSelector:
          matchLabels:
            steward.syn.tools/include-facts: ''
    - name: configmap_target
      resource:
        apiVersion: v1
        kind: ConfigMap
        name: additional-facts
  serviceAccountRef:
    name: steward-additional-facts-manager
  template: |
    local esp = import 'espejote.libsonnet';

    local facts = import 'steward-additional-facts/facts.json';
    local namespace = import 'steward-additional-facts/namespace.json';

    local filterConfigmaps(configmaps) =
      local nameField = function(obj) obj.metadata.name;
      std.filter(
        function(obj) std.objectHas(obj.data, 'facts'),
        std.sort(configmaps, nameField)
      );

    local configmapsFacts = filterConfigmaps(esp.context().configmap_facts);

    // Builds a new object from its input.
    // All keys which contain an object or array will be suffixed with `+` in the result.
    local makeMergeable(o) = {
      [key]+: makeMergeable(o[key])
      for key in std.objectFields(o)
      if std.isObject(o[key])
    } + {
      [key]+: o[key]
      for key in std.objectFields(o)
      if std.isArray(o[key])
    } + {
      [key]: o[key]
      for key in std.objectFields(o)
      if !std.isObject(o[key]) && !std.isArray(o[key])
    };

    local targetMetadata(configmaps) =
      local cmNames = std.map(
        function(obj) obj.metadata.name,
        configmaps
      );
      {
        annotations+: {
          'steward.syn.tools/active-configmaps': std.manifestJsonMinified(cmNames),
        },
        labels+: {
          'app.kubernetes.io/managed-by': 'espejote',
        },
        name: 'additional-facts',
        namespace: namespace.name,
      };

    local mergeFacts(configmaps, facts) =
      local cmFacts = std.map(
        function(obj) std.parseJson(std.get(obj.data, 'facts', '')),
        configmaps
      );
      std.foldl(
        function(a, b) a + makeMergeable(b),
        cmFacts + [ facts ],
        {}
      );

    {
      apiVersion: 'v1',
      kind: 'ConfigMap',
      metadata: targetMetadata(configmapsFacts),
      data: mergeFacts(configmapsFacts, facts),
    }
  triggers:
    - name: jsonnetlib
      watchResource:
        apiVersion: espejote.io/v1alpha1
        kind: JsonnetLibrary
        name: steward-additional-facts
    - name: configmap_facts
      watchContextResource:
        name: configmap_facts
    - name: configmap_target
      watchContextResource:
        name: configmap_target
